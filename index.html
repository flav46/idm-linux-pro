<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IDM Linux Pro</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .download-btn {
      background: #22c55e;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .progress-bar {
      height: 10px;
      background: #334155;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #38bdf8;
      transition: width 0.3s;
    }

    .actions {
      margin-top: 10px;
    }

    .pause { background: orange; }
    .resume { background: #3b82f6; }
  </style>
</head>

<body>

<h1>🚀 IDM Linux Pro</h1>

<div class="top-bar">
  <input id="url" placeholder="Paste download URL here..." />
  <button class="download-btn" onclick="startDownload()">Download</button>
</div>

<div id="downloads"></div>

<script>
const { ipcRenderer, shell } = require('electron');

let counter = 0;
let activeSection = 'downloads';
let downloads;
const icons = { video: '🎬', audio: '🎵', image: '🖼️', document: '📄', archive: '📦', youtube: '▶️', other: '📁' };
const themeNames = { dark: 'Dark', midnight: 'Midnight', forest: 'Forest', sunset: 'Sunset' };

function navigate(section, el) {
  activeSection = section;
  document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
  el.classList.add('active');
  
  const header = document.querySelector('.header h1');
  const desc = document.querySelector('.header p');
  
  if (section === 'downloads') {
    document.getElementById('downloadsSection').style.display = 'grid';
    document.getElementById('videosSection').style.display = 'none';
    document.getElementById('audioSection').style.display = 'none';
    document.getElementById('settingsSection').style.display = 'none';
    header.textContent = 'Downloads';
    desc.textContent = 'Manage your downloads and see real-time progress';
  } else if (section === 'videos') {
    document.getElementById('downloadsSection').style.display = 'none';
    document.getElementById('videosSection').style.display = 'grid';
    document.getElementById('audioSection').style.display = 'none';
    document.getElementById('settingsSection').style.display = 'none';
    header.textContent = 'Videos';
    desc.textContent = 'Manage your Videos from your ~/Videos folder';
  } else if (section === 'audio') {
    document.getElementById('downloadsSection').style.display = 'none';
    document.getElementById('videosSection').style.display = 'none';
    document.getElementById('audioSection').style.display = 'grid';
    document.getElementById('settingsSection').style.display = 'none';
    header.textContent = 'Audio';
    desc.textContent = 'Manage your Audio from your ~/Music folder';
  } else if (section === 'files') {
    document.getElementById('downloadsSection').style.display = 'none';
    document.getElementById('videosSection').style.display = 'none';
    document.getElementById('audioSection').style.display = 'none';
    document.getElementById('filesSection').style.display = 'grid';
    document.getElementById('settingsSection').style.display = 'none';
    header.textContent = 'All Files';
    desc.textContent = 'Manage your downloaded files from ~/Downloads';
    loadFiles();
  } else if (section === 'settings') {
    document.getElementById('downloadsSection').style.display = 'none';
    document.getElementById('videosSection').style.display = 'none';
    document.getElementById('audioSection').style.display = 'none';
    document.getElementById('settingsSection').style.display = 'block';
    header.textContent = 'Settings';
    desc.textContent = 'Configure your download preferences';
  }
}

function openVideosFolder() {
  shell.openPath(require('os').homedir() + '/Videos');
}

function openMusicFolder() {
  shell.openPath(require('os').homedir() + '/Music');
}

function openDownloadsFolder() {
  shell.openPath(require('os').homedir() + '/Downloads');
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(1) + " MB";
  return (bytes/(1024*1024*1024)).toFixed(2) + " GB";
}

async function loadFiles() {
  const files = await window.api.invoke('listFiles', '~/Downloads');
  const container = document.getElementById('filesSection');
  container.innerHTML = '';
  
  if (files.length === 0) {
    container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📁</div><h3>No files yet</h3><p>Downloads will appear here</p></div>';
    return;
  }
  
  files.forEach(file => {
    const div = document.createElement('div');
    div.className = 'folder-item';
    const icon = file.isDirectory ? '📁' : '📄';
    div.innerHTML = `<div class="thumb">${icon}</div><div class="name">${file.name}</div><div class="size">${formatSize(file.size)}</div>`;
    div.onclick = () => {
      if (file.isDirectory) {
        shell.openPath(require('os').homedir() + '/Downloads/' + file.name);
      } else {
        shell.openPath(require('os').homedir() + '/Downloads/' + file.name);
      }
    };
    container.appendChild(div);
  });
}

function add() {
  const url = document.getElementById('url').value;
  if (!url) return alert("Enter URL");

  const id = "dl_" + counter++;
  
  const container = document.createElement("div");
  container.className = "card";
  container.id = id;

  container.innerHTML = `
    <div><b>${url}</b></div>
    <div id="${id}_text">Starting...</div>

    <div class="progress-bar">
      <div id="${id}_bar" class="progress"></div>
    </div>
    <div class="card-actions">
      <button onclick="pause('${id}')">Pause</button>
      <button onclick="resume('${id}')">Resume</button>
      <button onclick="cancel('${id}')">Cancel</button>
    </div>
  `;

  document.getElementById("downloads").appendChild(container);

  ipcRenderer.send("download", id, url);
}

// UPDATE UI
ipcRenderer.on("update", (e, data) => {
  const el = document.getElementById(data.id + "_text");
  const bar = document.getElementById(data.id + "_bar");

  if (!el) return;

  if (data.progress) {
    el.innerText = `Progress: ${data.progress}% | Speed: ${data.speed} KB/s`;
    bar.style.width = data.progress + "%";
  } else if (data.text) {
    el.innerText = data.text;
  }
});

// DONE
ipcRenderer.on("done", (e, id) => {
  const el = document.getElementById(id + "_text");
  if (el) el.innerText = "✅ Download Complete";
});

// PAUSE
function pause(id) {
  ipcRenderer.send("pause", id);
}

// RESUME
function resume(id) {
  ipcRenderer.send("resume", id);
}
</script>
</body>
</html>
